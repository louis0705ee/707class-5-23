<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>後台管理系統</title>
    <style>
        :root { --bg-color: #f5f5f7; --card-bg: #ffffff; --text-main: #1d1d1f; --primary: #0071e3; --danger: #ff3b30; --success: #34c759; }
        html { -webkit-text-size-adjust: 100%; font-size: 16px; }
        body { font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", sans-serif; background: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; }
        
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(20px); display: flex; justify-content: center; align-items: center; z-index: 100; }
        .login-box { background: rgba(255,255,255,0.9); padding: 40px; border-radius: 24px; text-align: center; width: 90%; max-width: 320px; }
        .login-box input { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #d2d2d7; border-radius: 12px; outline: none; }
        .login-btn { width: 100%; padding: 14px; background: var(--text-main); color: white; border: none; border-radius: 12px; cursor: pointer; margin-top: 15px; }

        #admin-panel { display: none; max-width: 1100px; margin: 0 auto; } 
        .header-title { font-weight: 700; font-size: 1.8rem; margin: 10px 0 30px 0; }
        .container { background: var(--card-bg); padding: 30px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.04); margin-bottom: 30px; }
        .container-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap:10px;}
        .container-header h2 { margin: 0; font-size: 1.4rem; }
        
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { padding: 15px; color: #86868b; font-size: 0.9rem; border-bottom: 2px solid #f5f5f7; }
        td { padding: 15px; border-bottom: 1px solid #f5f5f7; vertical-align: middle; }
        td input { padding: 10px; width: 95%; box-sizing: border-box; border: 1px solid #e5e5ea; border-radius: 8px; }
        
        button { padding: 10px 15px; background: var(--text-main); color: white; border: none; border-radius: 10px; cursor: pointer; margin-right: 5px; }
        button.red { background: rgba(255, 59, 48, 0.1); color: var(--danger); }
        button.green { background: var(--success); color: white; }
        
        @media (max-width: 768px) {
            table, thead, tbody, th, td, tr { display: block; }
            thead tr { display: none; }
            tr { margin-bottom: 20px; background: #fff; border-radius: 16px; padding: 15px; border: 1px solid #e5e5ea; }
            td { display: flex; flex-direction: column; padding: 10px 0; border-bottom: 1px dashed #f5f5f7; }
            td::before { content: attr(data-label); font-size: 0.8rem; color: #86868b; font-weight: 700; margin-bottom: 5px; }
            button { width: 100%; margin: 5px 0; }
        }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h2>管理員登入</h2>
        <input type="text" id="adminUser" placeholder="管理員帳號">
        <input type="password" id="adminPass" placeholder="管理員密碼">
        <button class="login-btn" onclick="checkLogin()">登入</button>
        <p id="errorMsg" style="color:var(--danger); display:none; margin-top:15px;">驗證失敗</p>
    </div>
</div>

<div id="admin-panel">
    <div class="header-title">園遊會中央控制台</div>
    
    <div class="container">
        <div class="container-header">
            <h2>即時訂單管理</h2>
            <div><button onclick="exportOrders()">📥 匯出 Excel</button><button onclick="loadOrders()" style="background:#f5f5f7; color:#333;">↻ 整理</button></div>
        </div>
        <table>
            <thead><tr><th>下單時間</th><th>顧客資訊</th><th>餐點明細</th><th>金額</th><th>操作</th></tr></thead>
            <tbody id="order-list"></tbody>
        </table>
    </div>

    <div class="container">
        <div class="container-header">
            <h2>📦 單點與套餐管理</h2>
            <div style="display: flex; gap: 5px; flex-wrap: wrap;">
                <!-- 💡 幫你把新增單點按鈕加回來了！ -->
                <button class="green" onclick="addSingleItem()">＋ 新增單點</button>
                <button onclick="resetMenuToDefault()" style="background:var(--danger);">⚠️ 載入你的專屬套餐</button> 
                <button onclick="saveMenuToCloud()" style="background:var(--primary)">💾 保存發布</button>
            </div>
        </div>
        <table>
            <thead><tr><th>分類</th><th>名稱</th><th width="80">原價</th><th width="80">特價</th><th width="90">庫存</th><th>圖片連結</th><th width="80">操作</th></tr></thead>
            <tbody id="menu-edit-list"></tbody>
        </table>
    </div>
</div>

<script>
    let currentMenu = [];
    let currentOrders = [];

    // 🌟 這裡就是為你量身打造的專屬套餐邏輯！
    const defaultMenu = [
        // 🍔 這裡是你原本的單點，都可以隨便改！
        { id: "m_main", type: "item", name: "招牌炒泡麵", desc: "主餐單點", price: 50, prePrice: 40, stock: 50, img: "", optionGroups: [] },
        { id: "m_drink1", type: "item", name: "冰紅茶", desc: "解渴神飲", price: 20, prePrice: 0, stock: 50, img: "", optionGroups: [] },
        { id: "m_drink2", type: "item", name: "特調奶茶", desc: "香濃好喝", price: 35, prePrice: 0, stock: 50, img: "", optionGroups: [] },

        // 👑 這是你要求的「完美套餐」
        {
            id: "c_combo1", 
            type: "combo", 
            name: "吃飽飽超值套餐", 
            desc: "含炒泡麵 + 飲料 (可加購蛋、換飲料補差價)", 
            price: 70, 
            prePrice: 60, 
            img: "",
            // 💡 庫存連動：買套餐，會自動去扣 m_main(炒泡麵) 跟 m_drink1(冰紅茶) 的庫存！
            comboItems: ["m_main", "m_drink1"], 
            optionGroups: [
                { 
                    name: "主餐加購", 
                    required: false, // 不是必填，客人可以不加
                    multiple: true,  // 允許客人複選
                    options: [
                        { name: "加一顆蛋", priceAdd: 15 }, // 💡 加蛋 +15元
                        { name: "加起司", priceAdd: 10 }
                    ] 
                },
                { 
                    name: "選擇飲料", 
                    required: true,  // 必填，一定要選一個飲料
                    multiple: false, // 只能單選
                    options: [
                        { name: "冰紅茶", priceAdd: 0 }, 
                        { name: "換特調奶茶", priceAdd: 15 } // 💡 換飲料自動 +15元！
                    ] 
                }
            ]
        }
    ];

    async function checkLogin() {
        const user = document.getElementById('adminUser').value;
        const pass = document.getElementById('adminPass').value;
        const resp = await fetch('/api/admin-login', { method: 'POST', headers: { "Content-Type": "application/json" }, body: JSON.stringify({ user, pass }) });
        if (resp.ok) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'block';
            loadOrders(); loadMenu();
        } else { document.getElementById('errorMsg').style.display = 'block'; }
    }

    async function loadOrders() {
        const resp = await fetch('/api/orders');
        currentOrders = await resp.json();
        let html = '';
        currentOrders.forEach((order, i) => {
            html += `<tr>
                <td data-label="時間">${order.time}</td><td data-label="資訊"><b>${order.name}</b><br><small>${order.identity}</small></td>
                <td data-label="明細" style="line-height:1.5;">${order.items}</td><td data-label="金額"><b>$${order.total}</b></td>
                <td data-label="操作"><button class="red" onclick="deleteOrder(${i})">刪除</button></td>
            </tr>`;
        });
        document.getElementById('order-list').innerHTML = html || '<tr><td colspan="5">目前尚無訂單</td></tr>';
    }

    function exportOrders() {
        if(currentOrders.length===0) return;
        let csv = "\ufeff下單時間,顧客姓名,聯絡資訊,餐點明細,總金額\n";
        currentOrders.forEach(o => {
            let cleanId = o.identity.replace(/<br>/g, '  ').replace(/,/g, ' ');
            let cleanItem = o.items.replace(/<br>/g, ' | ').replace(/<[^>]*>?/gm, '').replace(/,/g, ' ');
            csv += `${o.time},${o.name},${cleanId},${cleanItem},${o.total}\n`;
        });
        const link = document.createElement("a"); link.href = URL.createObjectURL(new Blob([csv], {type:'text/csv;charset=utf-8;'}));
        link.download = `訂單_${new Date().toLocaleDateString()}.csv`; link.click();
    }

    async function deleteOrder(i) {
        if(!confirm("確定刪除？")) return;
        currentOrders.splice(i, 1);
        await fetch('/api/orders', { method: 'PUT', headers: { "Content-Type": "application/json" }, body: JSON.stringify(currentOrders) });
        loadOrders();
    }

    async function loadMenu() {
        const resp = await fetch('/api/menu');
        let data = await resp.json();
        if (!data || data.length === 0 || !data[0].optionGroups) { currentMenu = JSON.parse(JSON.stringify(defaultMenu)); } 
        else { currentMenu = data; }
        renderMenuEditor();
    }

    async function resetMenuToDefault() {
        if(confirm("警告：這會載入程式碼內的預設菜單與你的專屬套餐，確定要執行嗎？")) {
            currentMenu = JSON.parse(JSON.stringify(defaultMenu));
            await saveMenuToCloud();
        }
    }

    // 💡 新增單點的功能回來了！
    function addSingleItem() {
        currentMenu.push({
            id: 'm' + Date.now(),
            type: 'item',
            name: "新商品名稱",
            desc: "",
            price: 0,
            prePrice: 0,
            stock: 50,
            img: "",
            optionGroups: [] // 單點預設沒有複雜選項
        });
        renderMenuEditor();
    }

    // 💡 刪除商品的功能也回來了！
    function removeItem(index) {
        if(confirm("確定要刪除這個商品嗎？")) {
            currentMenu.splice(index, 1);
            renderMenuEditor();
        }
    }

    function renderMenuEditor() {
        let html = '';
        currentMenu.forEach((item, i) => {
            let typeTag = item.type === 'combo' ? '<span style="color:#ff3b30; font-weight:bold;">套餐</span>' : '<span style="color:#0071e3; font-weight:bold;">單點</span>';
            let stockInput = item.type === 'combo' ? '<span style="color:#86868b">無(依單品)</span>' : `<input type="number" value="${item.stock||0}" id="m-stock-${i}" style="border-color:var(--primary); font-weight:bold;">`;
            
            html += `<tr>
                <td data-label="分類">${typeTag}</td>
                <td data-label="名稱"><input type="text" value="${item.name}" id="m-name-${i}"></td>
                <td data-label="原價"><input type="number" value="${item.price}" id="m-price-${i}"></td>
                <td data-label="特價"><input type="number" value="${item.prePrice||''}" id="m-prePrice-${i}"></td>
                <td data-label="庫存">${stockInput}</td>
                <td data-label="圖片"><input type="text" value="${item.img}" id="m-img-${i}"></td>
                <td data-label="操作"><button class="red" onclick="removeItem(${i})">刪除</button></td>
            </tr>`;
        });
        document.getElementById('menu-edit-list').innerHTML = html;
    }

    async function saveMenuToCloud() {
        currentMenu.forEach((item, i) => {
            item.name = document.getElementById(`m-name-${i}`).value;
            item.price = parseInt(document.getElementById(`m-price-${i}`).value) || 0;
            item.prePrice = parseInt(document.getElementById(`m-prePrice-${i}`).value) || 0;
            if(item.type === 'item') item.stock = parseInt(document.getElementById(`m-stock-${i}`).value) || 0;
            item.img = document.getElementById(`m-img-${i}`).value;
        });
        await fetch('/api/menu', { method: 'PUT', headers: { "Content-Type": "application/json" }, body: JSON.stringify(currentMenu) });
        alert("✅ 菜單與庫存已發布更新！"); loadMenu();
    }
</script>
</body>
</html>
