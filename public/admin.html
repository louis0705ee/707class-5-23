<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍔 園遊會後台 - 老闆專用</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #2c3e50; color: white; }
        .container { max-width: 900px; margin: 0 auto; background: white; color: black; padding: 20px; border-radius: 10px; margin-bottom: 20px;}
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #f4f4f4; }
        input { padding: 8px; width: 90%; box-sizing: border-box; }
        button { padding: 10px 15px; background: #e74c3c; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 14px; margin-right: 5px;}
        button.green { background: #2ecc71; }
        button:hover { opacity: 0.8; }
        .menu-img-preview { width: 50px; height: 50px; object-fit: cover; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2>📊 園遊會訂單管理</h2>
    <button onclick="loadOrders()">🔄 重新整理訂單</button>
    <table>
        <thead><tr><th>時間</th><th>姓名 / 聯絡方式</th><th>餐點明細</th><th>總金額</th></tr></thead>
        <tbody id="order-list"></tbody>
    </table>
</div>

<div class="container">
    <h2>🛠️ 菜單管理 (上下架與修改)</h2>
    <button class="green" onclick="addNewItemRow()">➕ 新增一項商品</button>
    <button onclick="saveMenuToCloud()">💾 儲存菜單到雲端</button>
    
    <table>
        <thead><tr><th>圖片預覽</th><th>商品名稱</th><th>價格 ($)</th><th>圖片網址 (URL)</th><th>操作</th></tr></thead>
        <tbody id="menu-edit-list"></tbody>
    </table>
</div>

<script>
    // ⚠️ 這裡要貼上你所有的鑰匙
    const API_KEY = '$2a$10$Ved0Z4ofi5lO5WZ7BG7W9eL3y82JQlNiuyQQYm6qJn6CD5dWZ/Xei';
    const ORDER_BIN_ID = '6a032250250b1311c33bdffa'; 
    const MENU_BIN_ID = '6a0328ab250b1311c33c0ecb'; 

    let currentMenu = [];

    // --- 訂單讀取功能 ---
    async function loadOrders() {
        document.getElementById('order-list').innerHTML = '<tr><td colspan="4">讀取中...</td></tr>';
        try {
            const resp = await fetch(`https://api.jsonbin.io/v3/b/${ORDER_BIN_ID}/latest`, { headers: { "X-Master-Key": API_KEY } });
            const data = await resp.json();
            const orders = data.record || [];
            let html = '';
            orders.forEach(order => {
                html += `<tr><td>${order.time}</td><td><b>${order.name}</b><br><small>${order.identity}</small></td><td>${order.items}</td><td style="color:red; font-weight:bold;">$${order.total}</td></tr>`;
            });
            document.getElementById('order-list').innerHTML = html || '<tr><td colspan="4">目前還沒有訂單</td></tr>';
        } catch (err) { alert('訂單讀取失敗'); }
    }

    // --- 菜單管理功能 ---
    async function loadMenu() {
        document.getElementById('menu-edit-list').innerHTML = '<tr><td colspan="5">菜單讀取中...</td></tr>';
        try {
            const resp = await fetch(`https://api.jsonbin.io/v3/b/${MENU_BIN_ID}/latest`, { headers: { "X-Master-Key": API_KEY } });
            const data = await resp.json();
            currentMenu = data.record || [];
            renderMenuEditor();
        } catch (err) { alert('菜單讀取失敗'); }
    }

    function renderMenuEditor() {
        let html = '';
        currentMenu.forEach((item, index) => {
            html += `
                <tr id="row-${index}">
                    <td><img src="${item.img}" class="menu-img-preview" onerror="this.src='https://via.placeholder.com/50?text=Error'"></td>
                    <td><input type="text" value="${item.name}" id="name-${index}"></td>
                    <td><input type="number" value="${item.price}" id="price-${index}"></td>
                    <td><input type="text" value="${item.img}" id="img-${index}" placeholder="請貼上圖片網址"></td>
                    <td><button onclick="removeItem(${index})">🗑️ 刪除</button></td>
                </tr>
            `;
        });
        document.getElementById('menu-edit-list').innerHTML = html;
    }

    function addNewItemRow() {
        currentMenu.push({ id: 'm' + Date.now(), name: "新商品", price: 0, img: "" });
        renderMenuEditor();
    }

    function removeItem(index) {
        currentMenu.splice(index, 1);
        renderMenuEditor();
    }

    async function saveMenuToCloud() {
        // 從表格把修改後的資料收集起來
        const newMenuData = currentMenu.map((item, index) => {
            return {
                id: item.id,
                name: document.getElementById(`name-${index}`).value,
                price: parseInt(document.getElementById(`price-${index}`).value) || 0,
                img: document.getElementById(`img-${index}`).value
            };
        });

        const btn = event.target;
        btn.innerText = "儲存中...";
        
        try {
            const resp = await fetch(`https://api.jsonbin.io/v3/b/${MENU_BIN_ID}`, {
                method: 'PUT',
                headers: { "Content-Type": "application/json", "X-Master-Key": API_KEY },
                body: JSON.stringify(newMenuData)
            });
            if (resp.ok) {
                alert("菜單更新成功！客人的畫面已經同步了！");
                loadMenu(); // 重新讀取
            }
        } catch (e) { alert("儲存失敗！"); }
        btn.innerText = "💾 儲存菜單到雲端";
    }

    // 網頁打開時同時讀取訂單與菜單
    loadOrders();
    loadMenu();
</script>
</body>
</html>
