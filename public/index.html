<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎡 園遊會預購系統</title>
    <style>
        /* 現代化 UI 變數與基本設定 */
        :root {
            --primary: #ff4757;
            --primary-hover: #ff6b81;
            --bg-color: #f1f2f6;
            --card-bg: #ffffff;
            --text-main: #2f3542;
            --text-muted: #747d8c;
            --shadow: 0 10px 20px rgba(0,0,0,0.08);
        }
        body { font-family: "Microsoft JhengHei", "PingFang TC", sans-serif; background: var(--bg-color); margin: 0; padding: 0; display: flex; justify-content: center; color: var(--text-main); }
        .app-container { width: 100%; max-width: 480px; background: var(--card-bg); min-height: 100vh; padding: 25px; box-sizing: border-box; box-shadow: var(--shadow); position: relative; }
        .hidden { display: none !important; }
        
        h2 { text-align: center; color: var(--text-main); font-weight: 800; margin-bottom: 25px; letter-spacing: 1px; }
        
        /* 表單與按鈕現代化 */
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #57606f; font-size: 0.95rem; }
        input[type="text"], input[type="tel"] { width: 100%; padding: 12px 15px; border: 2px solid #dfe4ea; border-radius: 10px; box-sizing: border-box; font-size: 1rem; transition: 0.3s; outline: none; }
        input[type="text"]:focus, input[type="tel"]:focus { border-color: var(--primary); }
        
        .btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #ff4757, #ff6b81); color: white; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 15px; box-shadow: 0 4px 15px rgba(255, 71, 87, 0.3); transition: transform 0.2s, box-shadow 0.2s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255, 71, 87, 0.4); }
        .btn-secondary { background: #ced6e0; color: #2f3542; box-shadow: none; }
        .btn-secondary:hover { background: #a4b0be; box-shadow: none; }

        /* 菜單卡片現代化 */
        .menu-item { display: flex; align-items: center; padding: 15px; margin-bottom: 15px; background: #fff; border-radius: 15px; border: 1px solid #f1f2f6; box-shadow: 0 4px 10px rgba(0,0,0,0.03); transition: 0.3s; }
        .menu-item:hover { border-color: #ffeaa7; }
        .menu-item img { width: 85px; height: 85px; object-fit: cover; border-radius: 12px; margin-right: 15px; }
        .item-info { flex-grow: 1; }
        .item-title { font-weight: 700; font-size: 1.1rem; margin: 0 0 5px 0; }
        
        /* 價格顯示邏輯 */
        .price-area { margin-top: 5px; }
        .old-price { text-decoration: line-through; color: var(--text-muted); font-size: 0.9rem; margin-right: 8px; }
        .new-price { color: var(--primary); font-weight: 800; font-size: 1.2rem; }

        /* 數量控制器 */
        .qty-controls { display: flex; align-items: center; background: #f1f2f6; border-radius: 20px; padding: 2px 5px; }
        .qty-btn { width: 32px; height: 32px; background: white; border: none; border-radius: 50%; cursor: pointer; font-size: 1.2rem; font-weight: bold; color: var(--primary); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .qty-display { margin: 0 12px; font-weight: 800; width: 20px; text-align: center; }

        /* 其他區域 */
        .cart-bar { position: sticky; bottom: 20px; margin-top: 20px; z-index: 10; }
        .summary-box { background: #f8f9fa; padding: 20px; border-radius: 15px; border: 1px dashed #ced6e0; margin-bottom: 20px; }
        .summary-item { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 1.05rem; }
        .warning-text { color: var(--primary); font-weight: bold; text-align: center; margin: 15px 0; }
    </style>
</head>
<body>

<div class="app-container">
    <!-- 畫面 1: 登入/基本資訊 -->
    <div id="page-login">
        <h2>👋 歡迎來到預購系統</h2>
        <div class="form-group">
            <label>您是校內學生還是訪客？</label>
            <div style="display:flex; gap:15px; margin-bottom:10px;">
                <label style="font-weight:normal;"><input type="radio" name="userType" value="student" checked onchange="toggleUserForm()"> 校內學生</label>
                <label style="font-weight:normal;"><input type="radio" name="userType" value="outsider" onchange="toggleUserForm()"> 校外人員</label>
            </div>
        </div>
        <div id="student-fields">
            <div class="form-group"><label>班級 (例如: 107)</label><input type="text" id="classInfo" placeholder="請輸入班級"></div>
        </div>
        <div id="outsider-fields" class="hidden">
            <div class="form-group"><label>聯絡電話</label><input type="tel" id="phoneInfo" placeholder="請輸入您的手機號碼"></div>
        </div>
        <div class="form-group"><label>您的姓名</label><input type="text" id="userName" placeholder="請輸入姓名"></div>
        <button class="btn" onclick="goToMenu()">開始點餐 🚀</button>
    </div>

    <!-- 畫面 2: 菜單選擇 -->
    <div id="page-menu" class="hidden">
        <h2>🍔 本日嚴選菜單</h2>
        <div id="menu-list"><p style="text-align:center; color:#747d8c;">美味載入中，請稍候...</p></div>
        <div class="cart-bar"><button class="btn" onclick="goToCart()">🛒 查看購物車 (<span id="cart-count">0</span>)</button></div>
    </div>

    <!-- 畫面 3: 購物車確認 -->
    <div id="page-cart" class="hidden">
        <h2>🛒 我的購物車</h2>
        <div id="cart-items" class="summary-box"></div>
        <h2 style="text-align: right; color: #ff4757;">總計: $<span id="cart-total">0</span></h2>
        <button class="btn" onclick="goToReview()">下一步：確認訂單</button>
        <button class="btn btn-secondary" onclick="backToMenu()">再逛逛</button>
    </div>

    <!-- 畫面 4: 最終確認與送出 -->
    <div id="page-review" class="hidden">
        <h2>📋 最終確認</h2>
        <div class="summary-box" id="final-summary"></div>
        <p class="warning-text">⚠️ 請確認資訊是否正確，正確的話請按確認送出</p>
        <button class="btn" onclick="submitFinalOrder()" id="submitBtn">✅ 確認送出</button>
        <button class="btn btn-secondary" onclick="modifyInfo()">✏️ 修改資訊</button>
    </div>
</div>

<script>
    // ⚠️⚠️⚠️ 記得換成你自己的三把鑰匙！ ⚠️⚠️⚠️
    const API_KEY = '$2a$10$Ved0Z4ofi5lO5WZ7BG7W9eL3y82JQlNiuyQQYm6qJn6CD5dWZ/Xei';
    const ORDER_BIN_ID = '6a032250250b1311c33bdffa'; 
    const MENU_BIN_ID = '6a0328ab250b1311c33c0ecb'; 

    let menuData = [];
    let userInfo = {};
    let cart = {};

    window.onload = async function() {
        try {
            const resp = await fetch(`https://api.jsonbin.io/v3/b/${MENU_BIN_ID}/latest`, { headers: { "X-Master-Key": API_KEY } });
            const data = await resp.json();
            menuData = data.record || [];
            renderMenu(); 
        } catch (err) {
            document.getElementById('menu-list').innerHTML = '<p style="text-align:center; color:red;">載入失敗，請重新整理</p>';
        }
    };

    function toggleUserForm() {
        const isStudent = document.querySelector('input[name="userType"]:checked').value === 'student';
        document.getElementById('student-fields').classList.toggle('hidden', !isStudent);
        document.getElementById('outsider-fields').classList.toggle('hidden', isStudent);
    }

    function goToMenu() {
        const type = document.querySelector('input[name="userType"]:checked').value;
        const name = document.getElementById('userName').value.trim();
        const classInfo = document.getElementById('classInfo').value.trim();
        const phoneInfo = document.getElementById('phoneInfo').value.trim();
        if (!name) return alert("請輸入姓名！");
        if (type === 'student' && !classInfo) return alert("請輸入班級！");
        if (type === 'outsider' && !phoneInfo) return alert("請輸入電話！");

        userInfo = { type, name, identity: type === 'student' ? `班級: ${classInfo}` : `電話: ${phoneInfo}` };
        switchPage('page-menu');
    }

    function renderMenu() {
        const menuList = document.getElementById('menu-list');
        menuList.innerHTML = '';
        if (menuData.length === 0) { menuList.innerHTML = '<p style="text-align:center;">老闆還沒準備好菜單喔！</p>'; return; }

        menuData.forEach(item => {
            // 判斷最終結帳價格 (有預購價就用預購價，沒有就用原價)
            let activePrice = (item.prePrice && item.prePrice > 0) ? item.prePrice : item.price;
            
            // 初始化購物車
            if (!cart[item.id]) cart[item.id] = { name: item.name, price: activePrice, qty: 0 };
            
            // 決定價格顯示的 HTML 邏輯
            let priceHtml = '';
            if (item.prePrice && item.prePrice > 0) {
                priceHtml = `<span class="old-price">$${item.price}</span><span class="new-price">$${item.prePrice}</span>`;
            } else {
                priceHtml = `<span class="new-price">$${item.price}</span>`;
            }

            let imgSrc = item.img ? item.img : 'https://via.placeholder.com/80/cccccc/000000?text=Food';

            menuList.innerHTML += `
                <div class="menu-item">
                    <img src="${imgSrc}" onerror="this.src='https://via.placeholder.com/80/ffcccc/000000?text=Error'">
                    <div class="item-info">
                        <p class="item-title">${item.name}</p>
                        <div class="price-area">${priceHtml}</div>
                    </div>
                    <div class="qty-controls">
                        <button class="qty-btn" onclick="updateQty('${item.id}', -1)">-</button>
                        <span class="qty-display" id="qty-${item.id}">${cart[item.id].qty}</span>
                        <button class="qty-btn" onclick="updateQty('${item.id}', 1)">+</button>
                    </div>
                </div>
            `;
        });
    }

    function updateQty(id, change) {
        let newQty = cart[id].qty + change;
        if (newQty < 0) newQty = 0;
        cart[id].qty = newQty;
        document.getElementById(`qty-${id}`).innerText = newQty;
        document.getElementById('cart-count').innerText = Object.values(cart).reduce((sum, item) => sum + item.qty, 0);
    }

    function goToCart() {
        if (Object.values(cart).reduce((sum, item) => sum + item.qty, 0) === 0) return alert("還沒選餐點喔！");
        const cartItemsDiv = document.getElementById('cart-items');
        let html = '';
        let totalAmt = 0;
        Object.values(cart).forEach(item => {
            if (item.qty > 0) {
                let subtotal = item.price * item.qty;
                totalAmt += subtotal;
                html += `<div class="summary-item"><span><b>${item.name}</b> x ${item.qty}</span><span>$${subtotal}</span></div>`;
            }
        });
        cartItemsDiv.innerHTML = html;
        document.getElementById('cart-total').innerText = totalAmt;
        switchPage('page-cart');
    }

    function backToMenu() { switchPage('page-menu'); }

    function goToReview() {
        const summaryDiv = document.getElementById('final-summary');
        let html = `<p style="margin-top:0;"><b>訂購人：</b> ${userInfo.name}</p><p><b>聯絡資訊：</b> ${userInfo.identity}</p><hr style="border:0; border-top:1px dashed #ccc; margin:15px 0;"><p><b>餐點明細：</b></p>`;
        let totalAmt = 0;
        Object.values(cart).forEach(item => {
            if (item.qty > 0) {
                html += `<div class="summary-item"><span>- ${item.name} x ${item.qty}</span></div>`;
                totalAmt += (item.price * item.qty);
            }
        });
        html += `<hr style="border:0; border-top:1px dashed #ccc; margin:15px 0;"><h2 style="text-align:right; margin:0; color:#ff4757;">應付金額：$${totalAmt}</h2>`;
        summaryDiv.innerHTML = html;
        switchPage('page-review');
    }

    function modifyInfo() { switchPage('page-login'); }

    async function submitFinalOrder() {
        const btn = document.getElementById('submitBtn');
        btn.innerText = "🔄 訂單傳送中...";
        btn.disabled = true;

        let orderItems = '';
        let totalAmt = 0;
        Object.values(cart).forEach(item => {
            if (item.qty > 0) {
                orderItems += `${item.name} x${item.qty}<br>`;
                totalAmt += (item.price * item.qty);
            }
        });

        const newOrder = { time: new Date().toLocaleTimeString(), name: userInfo.name, identity: userInfo.identity, items: orderItems, total: totalAmt };

        try {
            const getResp = await fetch(`https://api.jsonbin.io/v3/b/${ORDER_BIN_ID}/latest`, { headers: { "X-Master-Key": API_KEY } });
            const oldData = await getResp.json();
            let allOrders = oldData.record || [];
            allOrders.push(newOrder);

            const updateResp = await fetch(`https://api.jsonbin.io/v3/b/${ORDER_BIN_ID}`, { method: 'PUT', headers: { "Content-Type": "application/json", "X-Master-Key": API_KEY }, body: JSON.stringify(allOrders) });

            if (updateResp.ok) {
                alert("🎉 預購成功！老闆已經收到你的訂單囉！");
                location.reload(); 
            }
        } catch (err) {
            alert("傳送失敗，請稍後再試！");
            btn.innerText = "✅ 確認送出";
            btn.disabled = false;
        }
    }

    function switchPage(pageId) {
        document.getElementById('page-login').classList.add('hidden');
        document.getElementById('page-menu').classList.add('hidden');
        document.getElementById('page-cart').classList.add('hidden');
        document.getElementById('page-review').classList.add('hidden');
        document.getElementById(pageId).classList.remove('hidden');
        window.scrollTo(0,0);
    }
</script>
</body>
</html>
