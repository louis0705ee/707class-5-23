<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ең’йҒҠжңғй җиіјзі»зөұ</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background: #f4f7f6; margin: 0; padding: 0; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 500px; background: white; min-height: 100vh; padding: 20px; box-sizing: border-box; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .hidden { display: none !important; }
        h2 { text-align: center; color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="tel"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; background: #4CAF50; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; margin-top: 10px; }
        .btn-secondary { background: #9e9e9e; }
        .btn:hover { opacity: 0.9; }
        .menu-item { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
        .menu-item img { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; margin-right: 15px; background: #eee; }
        .item-info { flex-grow: 1; }
        .item-title { font-weight: bold; font-size: 18px; margin: 0 0 5px 0; }
        .item-price { color: #e74c3c; margin: 0; }
        .qty-controls { display: flex; align-items: center; }
        .qty-btn { width: 30px; height: 30px; background: #ddd; border: none; border-radius: 5px; cursor: pointer; font-size: 18px; }
        .qty-display { margin: 0 10px; font-weight: bold; width: 20px; text-align: center; }
        .cart-bar { position: sticky; bottom: 20px; margin-top: 20px; }
        .summary-box { background: #f9f9f9; padding: 15px; border-radius: 8px; border: 1px dashed #ccc; margin-bottom: 15px; }
        .warning-text { color: #e74c3c; font-weight: bold; text-align: center; margin: 15px 0; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="page-login">
        <h2>рҹ“қ й җиіјиіҮж–ҷеЎ«еҜ«</h2>
        <div class="form-group">
            <label>иә«еҲҶйҒёж“Үпјҡ</label>
            <input type="radio" name="userType" value="student" checked onchange="toggleUserForm()"> ж Ўе…§еӯёз”ҹ
            <input type="radio" name="userType" value="outsider" onchange="toggleUserForm()"> ж ЎеӨ–дәәе“Ў
        </div>
        <div id="student-fields">
            <div class="form-group">
                <label>зҸӯзҙҡпјҡ</label>
                <input type="text" id="classInfo" placeholder="дҫӢеҰӮпјҡ107">
            </div>
        </div>
        <div id="outsider-fields" class="hidden">
            <div class="form-group">
                <label>иҒҜзөЎйӣ»и©ұпјҡ</label>
                <input type="tel" id="phoneInfo" placeholder="дҫӢеҰӮпјҡ0912345678">
            </div>
        </div>
        <div class="form-group">
            <label>е§“еҗҚпјҡ</label>
            <input type="text" id="userName" placeholder="дҫӢеҰӮпјҡLouis">
        </div>
        <button class="btn" onclick="goToMenu()">дёӢдёҖжӯҘпјҡй–Ӣе§Ӣй»һйӨҗ</button>
    </div>

    <div id="page-menu" class="hidden">
        <h2>рҹҚ” й җиіјиҸңе–®</h2>
        <div id="menu-list"></div>
        <div class="cart-bar">
            <button class="btn" onclick="goToCart()">рҹӣ’ жҹҘзңӢиіјзү©и»Ҡ (<span id="cart-count">0</span>)</button>
        </div>
    </div>

    <div id="page-cart" class="hidden">
        <h2>рҹӣ’ дҪ зҡ„иіјзү©и»Ҡ</h2>
        <div id="cart-items" class="summary-box"></div>
        <h3 style="text-align: right;">зёҪиЁҲ: $<span id="cart-total">0</span></h3>
        <button class="btn" onclick="goToReview()">зўәиӘҚй җиіј</button>
        <button class="btn btn-secondary" onclick="backToMenu()">з№јзәҢй»һйӨҗ</button>
    </div>

    <div id="page-review" class="hidden">
        <h2>рҹ“Ӣ жңҖзөӮзўәиӘҚ</h2>
        <div class="summary-box" id="final-summary"></div>
        <p class="warning-text">и«ӢзўәиӘҚдҝЎжҒҜжҳҜеҗҰжӯЈзўәпјҢжӯЈзўәзҡ„и©ұпјҢи«ӢзўәиӘҚйҖҒеҮә</p>
        <button class="btn" onclick="submitFinalOrder()" id="submitBtn">зўәиӘҚйҖҒеҮә</button>
        <button class="btn btn-secondary" onclick="modifyInfo()">дҝ®ж”№дҝЎжҒҜ</button>
    </div>
</div>

<script>
    // вҡ пёҸ йҖҷиЈЎиҰҒжҸӣжҲҗдҪ иҮӘе·ұзҡ„ JSONBin еҜҶй‘°пјҒ
    const BIN_ID = '6a032250250b1311c33bdffa'; 
    const API_KEY = '$2a$10$Ved0Z4ofi5lO5WZ7BG7W9eL3y82JQlNiuyQQYm6qJn6CD5dWZ/Xei';

    const menuData = [
        { id: 'm1', name: 'жӢӣзүҢеӨ§и…ёеҢ…е°Ҹи…ё', price: 60, img: 'https://via.placeholder.com/80/FFB6C1/000000?text=Sausage' },
        { id: 'm2', name: 'жё…ж¶јеҪҲзҸ жұҪж°ҙ', price: 35, img: 'https://via.placeholder.com/80/87CEFA/000000?text=Soda' },
        { id: 'm3', name: 'зҸҫзӮёи„Ҷи–Ҝ', price: 40, img: 'https://via.placeholder.com/80/FFD700/000000?text=Fries' }
    ];

    let userInfo = {};
    let cart = {};

    function toggleUserForm() {
        const isStudent = document.querySelector('input[name="userType"]:checked').value === 'student';
        document.getElementById('student-fields').classList.toggle('hidden', !isStudent);
        document.getElementById('outsider-fields').classList.toggle('hidden', isStudent);
    }

    function goToMenu() {
        const type = document.querySelector('input[name="userType"]:checked').value;
        const name = document.getElementById('userName').value.trim();
        const classInfo = document.getElementById('classInfo').value.trim();
        const phoneInfo = document.getElementById('phoneInfo').value.trim();

        if (!name) return alert("и«Ӣијёе…Ҙе§“еҗҚпјҒ");
        if (type === 'student' && !classInfo) return alert("и«Ӣијёе…ҘзҸӯзҙҡпјҒ");
        if (type === 'outsider' && !phoneInfo) return alert("и«Ӣијёе…Ҙйӣ»и©ұпјҒ");

        userInfo = { type, name, identity: type === 'student' ? `зҸӯзҙҡ: ${classInfo}` : `йӣ»и©ұ: ${phoneInfo}` };
        renderMenu();
        switchPage('page-menu');
    }

    function renderMenu() {
        const menuList = document.getElementById('menu-list');
        menuList.innerHTML = '';
        menuData.forEach(item => {
            if (!cart[item.id]) cart[item.id] = { ...item, qty: 0 };
            menuList.innerHTML += `
                <div class="menu-item">
                    <img src="${item.img}" alt="${item.name}">
                    <div class="item-info">
                        <p class="item-title">${item.name}</p>
                        <p class="item-price">$${item.price}</p>
                    </div>
                    <div class="qty-controls">
                        <button class="qty-btn" onclick="updateQty('${item.id}', -1)">-</button>
                        <span class="qty-display" id="qty-${item.id}">${cart[item.id].qty}</span>
                        <button class="qty-btn" onclick="updateQty('${item.id}', 1)">+</button>
                    </div>
                </div>
            `;
        });
    }

    function updateQty(id, change) {
        let newQty = cart[id].qty + change;
        if (newQty < 0) newQty = 0;
        cart[id].qty = newQty;
        document.getElementById(`qty-${id}`).innerText = newQty;
        document.getElementById('cart-count').innerText = Object.values(cart).reduce((sum, item) => sum + item.qty, 0);
    }

    function goToCart() {
        if (Object.values(cart).reduce((sum, item) => sum + item.qty, 0) === 0) return alert("дҪ йӮ„жІ’жңүйҒёж“ҮйӨҗй»һе–”пјҒ");
        const cartItemsDiv = document.getElementById('cart-items');
        let html = '';
        let totalAmt = 0;
        Object.values(cart).forEach(item => {
            if (item.qty > 0) {
                let subtotal = item.price * item.qty;
                totalAmt += subtotal;
                html += `<div style="display:flex; justify-content:space-between; margin-bottom:5px;"><span>${item.name} x ${item.qty}</span><span>$${subtotal}</span></div>`;
            }
        });
        cartItemsDiv.innerHTML = html;
        document.getElementById('cart-total').innerText = totalAmt;
        switchPage('page-cart');
    }

    function backToMenu() { switchPage('page-menu'); }

    function goToReview() {
        const summaryDiv = document.getElementById('final-summary');
        let html = `<p><b>е§“еҗҚпјҡ</b> ${userInfo.name}</p><p><b>иҒҜзөЎиіҮиЁҠпјҡ</b> ${userInfo.identity}</p><hr><p><b>й җиіје…§е®№пјҡ</b></p>`;
        let totalAmt = 0;
        Object.values(cart).forEach(item => {
            if (item.qty > 0) {
                html += `<p>- ${item.name} x ${item.qty}</p>`;
                totalAmt += (item.price * item.qty);
            }
        });
        html += `<hr><h3 style="text-align:right; margin:0;">зёҪиЁҲйҮ‘йЎҚпјҡ$${totalAmt}</h3>`;
        summaryDiv.innerHTML = html;
        switchPage('page-review');
    }

    function modifyInfo() { switchPage('page-login'); }

    async function submitFinalOrder() {
        const btn = document.getElementById('submitBtn');
        btn.innerText = "иЁӮе–®еӮійҖҒдёӯ...";
        btn.disabled = true;

        let orderItems = '';
        let totalAmt = 0;
        Object.values(cart).forEach(item => {
            if (item.qty > 0) {
                orderItems += `${item.name} x${item.qty}<br>`;
                totalAmt += (item.price * item.qty);
            }
        });

        const newOrder = { time: new Date().toLocaleTimeString(), name: userInfo.name, identity: userInfo.identity, items: orderItems, total: totalAmt };

        try {
            const getResp = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, { headers: { "X-Master-Key": API_KEY } });
            const oldData = await getResp.json();
            let allOrders = oldData.record || [];
            allOrders.push(newOrder);

            const updateResp = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                method: 'PUT',
                headers: { "Content-Type": "application/json", "X-Master-Key": API_KEY },
                body: JSON.stringify(allOrders)
            });

            if (updateResp.ok) {
                alert("рҹҺү й җиіјжҲҗеҠҹпјҒиҖҒй—Ҷе·Із¶“ж”¶еҲ°дҪ зҡ„иЁӮе–®еӣүпјҒ");
                location.reload();
            }
        } catch (err) {
            alert("еӮійҖҒеӨұж•—пјҢи«ӢзЁҚеҫҢеҶҚи©ҰпјҒ");
            btn.innerText = "зўәиӘҚйҖҒеҮә";
            btn.disabled = false;
        }
    }

    function switchPage(pageId) {
        document.getElementById('page-login').classList.add('hidden');
        document.getElementById('page-menu').classList.add('hidden');
        document.getElementById('page-cart').classList.add('hidden');
        document.getElementById('page-review').classList.add('hidden');
        document.getElementById(pageId).classList.remove('hidden');
    }
</script>

</body>
</html>
